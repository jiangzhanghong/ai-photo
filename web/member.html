<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会员中心 - 光影AI</title>
    <link rel="stylesheet" href="./styles.css?v=20260427-prompts" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body id="top" class="member-page">

    <!-- Login modal -->
    <div class="auth-modal-backdrop" data-auth-backdrop aria-hidden="true">
      <div class="auth-modal" role="dialog" aria-modal="true" aria-label="登录注册">
        <button class="auth-modal-close" type="button" data-auth-close aria-label="关闭">✕</button>
        <div class="auth-modal-header">
          <h2>登录 / 注册</h2>
          <p>手机号验证码登录，未注册自动创建账号</p>
        </div>
        <div class="segmented auth-tabs" data-auth-mode>
          <button class="active" type="button" data-mode="phone-login">手机号登录</button>
          <button type="button" data-mode="reset">忘记密码</button>
          <button type="button" data-mode="wechat">微信扫码</button>
        </div>
        <div class="auth-modal-fields">
          <label class="mc-label">
            <span>手机号</span>
            <input type="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号" data-auth-phone />
          </label>
          <label class="mc-label" data-code-row>
            <span>验证码</span>
            <span class="inline-field">
              <input type="text" inputmode="numeric" maxlength="6" placeholder="请输入 6 位验证码" data-auth-code />
              <button type="button" data-send-code>获取验证码</button>
            </span>
          </label>
          <label class="mc-label" data-password-row>
            <span>新密码</span>
            <input type="password" placeholder="8-32 位，至少 3 类字符" data-auth-password />
          </label>
          <label class="mc-label" data-confirm-row>
            <span>确认密码</span>
            <input type="password" placeholder="再次输入密码" data-auth-confirm />
          </label>
          <button class="mc-btn mc-btn-primary auth-submit-btn" type="button" data-auth-submit>登录</button>
          <p class="form-message" data-auth-message role="status"></p>
        </div>
      </div>
    </div>

    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./index.html" aria-label="光影AI 首页">
          <span class="brand-name">光影AI</span>
          <span class="brand-line">AI摄影 · 创作 · 美学</span>
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html">首页</a>
          <a href="./index.html#works">作品集</a>
          <a class="active" href="#top">会员中心</a>
          <a href="#studio">AI创作</a>
          <a href="#records">生成记录</a>
        </nav>
        <a class="header-cta" href="./index.html#booking">预约咨询</a>
      </div>
    </header>

    <main class="member-main">

      <!-- Hero -->
      <section class="member-hero">
        <div class="shell member-hero-inner">
          <div class="member-hero-text">
            <h1>会员中心</h1>
            <p>管理积分，生成图片，查看创作记录</p>
          </div>
          <div class="member-summary">
            <div class="member-summary-row">
              <span class="summary-label">登录状态</span>
              <strong class="summary-state" data-login-state>未登录</strong>
            </div>
            <div class="member-summary-divider"></div>
            <div class="member-summary-row">
              <span class="summary-label">当前方案</span>
              <b class="summary-value" data-current-plan>未开通</b>
            </div>
            <div class="member-summary-row">
              <span class="summary-label">可用积分</span>
              <b class="summary-value summary-credits"><b data-credit-balance>0</b> 分</b>
            </div>
            <div class="member-summary-actions">
              <button class="member-login-toggle" type="button" data-login-toggle>登录 / 注册</button>
              <button class="member-logout-btn" type="button" data-logout>退出登录</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Studio + Records -->
      <section id="studio" class="member-section">
        <div class="shell">
          <div class="mc-section-header">
            <h2>AI 创作工作台</h2>
            <p>选择创作方案或输入完整提示词，提交生成任务</p>
          </div>
          <div class="member-workbench">

            <div class="mc-card ai-form">
              <div class="credit-bar">
                <span data-member-state>未开通会员</span>
                <strong><b data-form-credit>0</b> 积分</strong>
              </div>
              <div class="segmented" data-task-type>
                <button class="active" type="button" data-type="image_to_image">以图生图</button>
                <button type="button" data-type="generate">生成图片</button>
                <button type="button" data-type="edit">修改图片</button>
              </div>
              <label class="mc-label">
                <span>创作方案</span>
                <select data-prompt-select></select>
              </label>
              <div class="prompt-plan" data-prompt-plan></div>
              <label class="mc-label">
                <span>生图模型</span>
                <select data-model-select></select>
              </label>
              <div class="form-row-2">
                <label class="mc-label">
                  <span>图片尺寸</span>
                  <select data-size-select>
                    <option value="1:1">1:1 方图</option>
                    <option value="3:4">3:4 人像</option>
                    <option value="16:9">16:9 横图</option>
                  </select>
                </label>
                <label class="mc-label">
                  <span>数量</span>
                  <input type="number" min="1" max="4" value="1" data-image-count />
                </label>
              </div>
              <div class="upload-field" data-upload-field>
                <span class="upload-title">上传参考图 <em class="upload-size-hint">（最多 5 张，超过 5MB 自动压缩至 5MB 以内）</em></span>
                <label class="upload-zone" for="image-upload-input" data-upload-zone>
                  <span class="upload-zone-placeholder" data-upload-placeholder>点击或拖拽上传图片，最多 5 张</span>
                  <div class="upload-preview-list" data-upload-preview-list></div>
                  <button class="upload-clear" type="button" data-upload-clear aria-label="移除全部图片">✕</button>
                </label>
                <input id="image-upload-input" type="file" accept="image/*" multiple data-image-upload />
              </div>
              <label class="mc-label">
                <span>补充说明</span>
                <textarea rows="3" placeholder="例如：保留自然肤色，背景更干净" data-user-instruction></textarea>
              </label>
              <label class="mc-label">
                <span>完整自定义提示词</span>
                <textarea rows="4" placeholder="填写后将直接使用这段提示词，不再限定后台方案内容" data-custom-prompt></textarea>
              </label>
              <div class="cost-line">预计消耗 <strong data-credit-cost>0</strong> 积分</div>
              <button class="mc-btn mc-btn-primary submit-ai" type="button" data-submit-ai>提交 AI 任务</button>
              <p class="form-message" data-ai-message role="status"></p>
            </div>

            <div id="records" class="mc-card record-panel">
              <div class="task-head">
                <h3>生成记录</h3>
                <span data-task-count>0 条</span>
              </div>
              <div class="result-grid" data-task-list></div>
            </div>

          </div>
        </div>
      </section>

      <!-- Plans / Credits -->
      <section class="member-section member-section-last">
        <div class="shell">
          <div class="mc-section-header">
            <h2 data-plans-title>积分套餐</h2>
            <p data-plans-subtitle>购买积分，继续创作</p>
          </div>
          <div class="member-plan-grid" data-plan-list></div>
        </div>
      </section>

    </main>

    <script>
      (() => {
        const API_BASE = "";
        const tokenKey = "ai_photo_access_token";
        const refreshKey = "ai_photo_refresh_token";
        const state = {
          user: null,
          plans: [],
          prompts: [],
          models: [],
          taskType: "image_to_image",
          authMode: "phone-login",
          tasks: [],
          uploadedImages: []
        };

        const $ = (selector, root = document) => root.querySelector(selector);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
        const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (s) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[s]);

        const authHeaders = () => {
          const token = localStorage.getItem(tokenKey);
          return token ? { Authorization: `Bearer ${token}` } : {};
        };

        const api = async (path, options = {}) => {
          const response = await fetch(`${API_BASE}${path}`, {
            ...options,
            headers: {
              "Content-Type": "application/json",
              ...authHeaders(),
              ...(options.headers || {})
            }
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || "请求失败");
          return data;
        };

        const saveSession = (data) => {
          if (data.accessToken) localStorage.setItem(tokenKey, data.accessToken);
          if (data.refreshToken) localStorage.setItem(refreshKey, data.refreshToken);
          state.user = data.user;
        };

        const clearSession = () => {
          localStorage.removeItem(tokenKey);
          localStorage.removeItem(refreshKey);
          state.user = null;
          state.tasks = [];
        };

        const setMessage = (text) => {
          $("[data-ai-message]").textContent = text || "";
        };

        const setAuthMessage = (text) => {
          $("[data-auth-message]").textContent = text || "";
        };

        // Modal open/close
        const openModal = () => {
          $("[data-auth-backdrop]").classList.add("is-open");
          $("[data-auth-backdrop]").removeAttribute("aria-hidden");
          $("[data-auth-phone]").focus();
        };

        const closeModal = () => {
          $("[data-auth-backdrop]").classList.remove("is-open");
          $("[data-auth-backdrop]").setAttribute("aria-hidden", "true");
          setAuthMessage("");
        };

        const updateMemberState = () => {
          const membership = state.user?.membership;
          const credits = state.user?.credits || 0;
          const loggedIn = !!state.user;

          $("[data-login-state]").textContent = loggedIn ? "已登录" : "未登录";
          $("[data-current-plan]").textContent = membership ? membership.planName : "未开通";
          $("[data-credit-balance]").textContent = credits;
          $("[data-form-credit]").textContent = credits;
          $("[data-member-state]").textContent = loggedIn
            ? (membership ? `${membership.planName} · ${state.user.phone}` : `已登录 · ${state.user.phone}`)
            : "未登录";

          $("[data-login-toggle]").textContent = loggedIn ? "账号信息" : "登录 / 注册";
          $("[data-login-toggle]").style.display = loggedIn ? "none" : "";
          $("[data-logout]").style.display = loggedIn ? "" : "none";

          // Plans section: title changes based on login state
          $("[data-plans-title]").textContent = loggedIn ? "购买积分" : "会员套餐";
          $("[data-plans-subtitle]").textContent = loggedIn ? "选择套餐，积分即时到账" : "开通会员，解锁 AI 创作能力";

          $$("[data-open-plan]").forEach((btn) => {
            const isCurrent = membership?.planId === btn.dataset.planId;
            btn.textContent = isCurrent ? "当前方案" : (loggedIn ? "购买积分" : "开通会员");
            btn.disabled = isCurrent;
          });
        };

        const refreshMe = async () => {
          if (!localStorage.getItem(tokenKey)) return;
          try {
            const data = await api("/api/auth/me");
            state.user = data.user;
          } catch {
            clearSession();
          }
        };

        const renderPlans = () => {
          const list = $("[data-plan-list]");
          list.innerHTML = state.plans.map((plan) => `
            <article class="member-plan-card">
              <span>${plan.version}</span>
              <h3>${plan.name}</h3>
              <strong><small>¥</small>${plan.price}<em>${plan.suffix}</em></strong>
              <p>${plan.credits} 积分 · 可生成 ${plan.quota} 张</p>
              <ul>${plan.features.map((f) => `<li>${f}</li>`).join("")}</ul>
              <button type="button" data-open-plan="${plan.code}" data-plan-id="${plan.id}">开通会员</button>
            </article>
          `).join("");
          updateMemberState();
        };

        const updateTaskTypeButtons = () => {
          $$("[data-task-type] button").forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.type === state.taskType);
          });
          const needsUpload = state.taskType !== "generate";
          $("[data-upload-field]").classList.toggle("is-visible", needsUpload);
          if (!needsUpload) clearUpload();
        };

        // ── Image compress + preview ──────────────────────────────
        const MAX_BYTES = 5 * 1024 * 1024; // 5 MB
        const MAX_REFERENCE_IMAGES = 5;
        const MAX_COMPRESS_PX = 4096;

        const dataUrlBytes = (dataUrl) => {
          const base64 = String(dataUrl).split(",")[1] || "";
          return Math.floor(base64.length * 0.75);
        };

        const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("图片读取失败，请重新选择。"));
          reader.readAsDataURL(file);
        });

        const canvasDataUrl = (img, scale, quality) => {
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
          canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          return canvas.toDataURL("image/jpeg", quality);
        };

        const compressImage = async (file) => {
          if (file.size <= MAX_BYTES) return readFileAsDataUrl(file);
          return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
              URL.revokeObjectURL(url);
              const maxSide = Math.max(img.naturalWidth, img.naturalHeight);
              let scale = Math.min(1, MAX_COMPRESS_PX / maxSide);
              let best = "";
              while (scale >= 0.2) {
                let low = 0.45;
                let high = 0.92;
                for (let i = 0; i < 8; i++) {
                  const quality = (low + high) / 2;
                  const dataUrl = canvasDataUrl(img, scale, quality);
                  if (dataUrlBytes(dataUrl) <= MAX_BYTES) {
                    best = dataUrl;
                    low = quality;
                  } else {
                    high = quality;
                  }
                }
                if (best) {
                  resolve(best);
                  return;
                }
                scale *= 0.85;
              }
              reject(new Error("图片过大，无法压缩到 5MB 以内。"));
            };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("图片读取失败，请重新选择。")); };
            img.src = url;
          });
        };

        const renderUploadPreviews = () => {
          const zone = $("[data-upload-zone]");
          const list = $("[data-upload-preview-list]");
          const placeholder = $("[data-upload-placeholder]");
          list.innerHTML = state.uploadedImages.map((item, index) => `
            <span class="upload-preview-item">
              <img src="${item.dataUrl}" alt="${esc(item.name || `参考图 ${index + 1}`)}" />
              <button type="button" data-remove-upload="${item.id}" aria-label="移除参考图">✕</button>
            </span>
          `).join("");
          const hasImages = state.uploadedImages.length > 0;
          placeholder.style.display = hasImages ? "none" : "";
          zone.classList.toggle("has-preview", hasImages);
        };

        const addUploadPreviews = (items) => {
          state.uploadedImages.push(...items);
          renderUploadPreviews();
        };

        const clearUpload = () => {
          $("[data-image-upload]").value = "";
          state.uploadedImages = [];
          renderUploadPreviews();
        };

        const uploadReferenceImages = async () => {
          if (!state.uploadedImages.length) return [];
          const urls = await Promise.all(state.uploadedImages.map(async (item) => {
            if (item.uploadedUrl) return item.uploadedUrl;
            const data = await api("/api/uploads/images", {
              method: "POST",
              body: JSON.stringify({ imageData: item.dataUrl })
            });
            item.uploadedUrl = data.url;
            return data.url;
          }));
          return urls;
        };

        const handleImageFiles = async (fileList) => {
          const files = Array.from(fileList || []).filter((file) => file.type.startsWith("image/"));
          if (!files.length) {
            setMessage("请选择图片文件。");
            return;
          }
          const remaining = MAX_REFERENCE_IMAGES - state.uploadedImages.length;
          if (remaining <= 0) {
            setMessage(`最多上传 ${MAX_REFERENCE_IMAGES} 张参考图。`);
            return;
          }
          const selected = files.slice(0, remaining);
          try {
            const items = [];
            for (const file of selected) {
              const dataUrl = await compressImage(file);
              items.push({ id: `${Date.now()}-${Math.random().toString(16).slice(2)}`, name: file.name, dataUrl, uploadedUrl: "" });
            }
            addUploadPreviews(items);
            setMessage(files.length > remaining ? `最多上传 ${MAX_REFERENCE_IMAGES} 张参考图，已添加前 ${remaining} 张。` : "");
          } catch (e) {
            setMessage(e.message);
          }
        };

        const renderPromptOptions = async () => {
          const data = await api(`/api/prompts?taskType=${state.taskType}`);
          state.prompts = data.prompts;
          $("[data-prompt-select]").innerHTML = state.prompts.map((p) => `<option value="${p.id}">${esc(p.title)} · ${esc(p.scene)}</option>`).join("");
          renderPromptPlan();
          updateCost();
        };

        const currentPrompt = () => state.prompts.find((p) => p.id === $("[data-prompt-select]").value);

        const renderPromptPlan = () => {
          const prompt = currentPrompt();
          const box = $("[data-prompt-plan]");
          if (!prompt) {
            box.innerHTML = `<p>没有可用方案，也可以直接填写完整自定义提示词。</p>`;
            return;
          }
          box.innerHTML = `
            ${prompt.exampleImageUrl ? `<img src="${esc(prompt.exampleImageUrl)}" alt="${esc(prompt.title)}示例图" />` : ""}
            <div>
              <strong>${esc(prompt.title)}</strong>
              <p>${esc(prompt.userDescription || "适合按当前方案快速生成稳定效果。")}</p>
              <span>${esc(prompt.scene || "通用")} · ${prompt.creditCost || 0} 积分/张 · ${(prompt.categoryTags || []).map(esc).join(" / ")}</span>
            </div>
          `;
        };

        const renderModels = async () => {
          const data = await api(`/api/ai-models?taskType=${state.taskType}`);
          state.models = data.models;
          $("[data-model-select]").innerHTML = state.models.map((m) => `<option value="${m.id}">${m.name}</option>`).join("");
          if (data.preferredModelId) $("[data-model-select]").value = data.preferredModelId;
          updateCost();
        };

        const currentModel = () => state.models.find((m) => m.id === $("[data-model-select]").value);

        const updateCost = () => {
          const countInput = $("[data-image-count]");
          const count = Math.max(1, Math.min(4, Number(countInput.value || 1)));
          countInput.value = count;
          const model = currentModel();
          const cost = model ? Number(model.creditCost?.[state.taskType] || 0) * count : 0;
          $("[data-credit-cost]").textContent = cost;
          return cost;
        };

        const statusText = (s) => ({ queued: "排队中", processing: "生成中", succeeded: "已完成", failed: "失败", refunded: "已退款" })[s] || s;

        const renderTasks = () => {
          const list = $("[data-task-list]");
          $("[data-task-count]").textContent = `${state.tasks.length} 条`;
          if (!state.tasks.length) {
            list.innerHTML = `<p class="empty-task">暂无生成记录。</p>`;
            return;
          }
          list.innerHTML = state.tasks.map((task) => {
            const resultImages = task.resultImageUrls || [];
            return `
            <article class="result-card">
              <div class="result-thumbs">
                ${resultImages.length
                  ? resultImages.map((url, index) => `<img src="${esc(url)}" alt="${esc(task.promptTitle)}结果 ${index + 1}" />`).join("")
                  : `<img src="./assets/work-portrait.jpg" alt="${esc(task.promptTitle)}占位图" />`}
              </div>
              <div class="result-meta">
                <strong>${esc(task.promptTitle)}</strong>
                <span>${statusText(task.status)} · ${esc(task.aiModelName)} · ${task.count} 张 · ${task.creditCost} 积分</span>
                ${task.failureReason ? `<span>${esc(task.failureReason)}</span>` : ""}
                ${resultImages.map((url, index) => `<a href="${esc(url)}" download>下载${resultImages.length > 1 ? ` ${index + 1}` : "图片"}</a>`).join("")}
              </div>
            </article>
          `;
          }).join("");
        };

        const loadTasks = async () => {
          if (!state.user) { renderTasks(); return; }
          const data = await api("/api/ai-image-tasks");
          state.tasks = data.tasks;
          renderTasks();
        };

        const watchTaskUntilDone = async (taskId) => {
          for (let i = 0; i < 60; i++) {
            await new Promise((r) => window.setTimeout(r, 2000));
            await loadTasks();
            const task = state.tasks.find((t) => t.id === taskId);
            if (!task || task.status === "succeeded" || task.status === "failed") {
              setMessage(task?.status === "succeeded" ? "任务已完成，可在右侧查看和下载。" : (task?.failureReason || "任务处理结束。"));
              return;
            }
          }
          setMessage("任务仍在生成中，稍后可在生成记录查看结果。");
        };

        const updateAuthMode = () => {
          $$("[data-auth-mode] button").forEach((btn) => btn.classList.toggle("active", btn.dataset.mode === state.authMode));
          $("[data-code-row]").style.display = state.authMode !== "wechat" ? "grid" : "none";
          $("[data-password-row]").style.display = state.authMode === "reset" ? "grid" : "none";
          $("[data-confirm-row]").style.display = state.authMode === "reset" ? "grid" : "none";
          $("[data-auth-submit]").textContent = state.authMode === "reset" ? "重置密码" : "登录";
        };

        const initAuth = () => {
          $("[data-login-toggle]").addEventListener("click", openModal);

          $("[data-auth-close]").addEventListener("click", closeModal);
          $("[data-auth-backdrop]").addEventListener("click", (e) => {
            if (e.target === $("[data-auth-backdrop]")) closeModal();
          });
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
          });

          $("[data-auth-mode]").addEventListener("click", (e) => {
            const btn = e.target.closest("[data-mode]");
            if (!btn) return;
            state.authMode = btn.dataset.mode;
            updateAuthMode();
          });

          $("[data-send-code]").addEventListener("click", async () => {
            try {
              const sceneMap = { "phone-login": "login", reset: "reset_password" };
              await api("/api/auth/verification-codes", {
                method: "POST",
                body: JSON.stringify({ targetType: "phone", target: $("[data-auth-phone]").value, scene: sceneMap[state.authMode] || "login" })
              });
              setAuthMessage("验证码已发送。");
            } catch (e) {
              setAuthMessage(e.message);
            }
          });

          $("[data-auth-submit]").addEventListener("click", async () => {
            const phone = $("[data-auth-phone]").value;
            const code = $("[data-auth-code]").value;
            const password = $("[data-auth-password]").value;
            const confirmPassword = $("[data-auth-confirm]").value;
            try {
              if (state.authMode === "phone-login") {
                const data = await api("/api/auth/login/phone-code", { method: "POST", body: JSON.stringify({ phone, code }) });
                saveSession(data);
                await Promise.all([renderModels(), loadTasks()]);
                updateMemberState();
                closeModal();
              } else if (state.authMode === "wechat") {
                const qr = await api("/api/auth/wechat/qr/create", { method: "POST" });
                setAuthMessage(qr.message || "微信扫码登录待接入。");
              } else {
                await api("/api/auth/password/reset", { method: "POST", body: JSON.stringify({ phone, code, password, confirmPassword }) });
                clearSession();
                updateMemberState();
                setAuthMessage("密码已重设，请重新登录。");
              }
            } catch (e) {
              setAuthMessage(e.message);
            }
          });

          $("[data-logout]").addEventListener("click", async () => {
            try {
              await api("/api/auth/logout", { method: "POST", body: JSON.stringify({ refreshToken: localStorage.getItem(refreshKey) }) });
            } catch { /* ignore */ }
            clearSession();
            updateMemberState();
            renderTasks();
          });
        };

        const initStudio = () => {
          $("[data-task-type]").addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            state.taskType = btn.dataset.type;
            updateTaskTypeButtons();
            Promise.all([renderPromptOptions(), renderModels()]);
          });

          $("[data-prompt-select]").addEventListener("change", () => {
            renderPromptPlan();
            updateCost();
          });
          $("[data-model-select]").addEventListener("change", updateCost);
          $("[data-image-count]").addEventListener("input", updateCost);

          // File input change
          $("[data-image-upload]").addEventListener("change", (e) => {
            handleImageFiles(e.target.files);
          });

          // Drag and drop
          const zone = $("[data-upload-zone]");
          zone.addEventListener("dragover", (e) => { e.preventDefault(); zone.classList.add("drag-over"); });
          zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
          zone.addEventListener("drop", (e) => {
            e.preventDefault();
            zone.classList.remove("drag-over");
            handleImageFiles(e.dataTransfer.files);
          });
          zone.addEventListener("click", (e) => {
            const btn = e.target.closest("[data-remove-upload]");
            if (!btn) return;
            e.preventDefault();
            state.uploadedImages = state.uploadedImages.filter((item) => item.id !== btn.dataset.removeUpload);
            renderUploadPreviews();
          });

          // Clear button
          $("[data-upload-clear]").addEventListener("click", (e) => {
            e.preventDefault();
            clearUpload();
          });

          // Submit with loading state
          const submitBtn = $("[data-submit-ai]");
          $("[data-submit-ai]").addEventListener("click", async () => {
            if (!state.user) { openModal(); return; }
            if (!state.user.membership) {
              setMessage("请先购买积分套餐。");
              document.querySelector(".member-section-last").scrollIntoView({ behavior: "smooth", block: "start" });
              return;
            }
            if (state.taskType !== "generate" && !state.uploadedImages.length) {
              setMessage("该任务类型需要先上传参考图。");
              return;
            }
            if (!$("[data-custom-prompt]").value.trim() && !$("[data-prompt-select]").value) {
              setMessage("请选择创作方案，或输入完整自定义提示词。");
              return;
            }
            submitBtn.disabled = true;
            submitBtn.textContent = "提交中…";
            setMessage("");
            try {
              const inputImageUrls = state.taskType === "generate" ? [] : await uploadReferenceImages();
              const data = await api("/api/ai-image-tasks", {
                method: "POST",
                body: JSON.stringify({
                  taskType: state.taskType,
                  promptTemplateId: $("[data-prompt-select]").value,
                  customPrompt: $("[data-custom-prompt]").value,
                  aiModelId: $("[data-model-select]").value,
                  size: $("[data-size-select]").value,
                  count: Math.max(1, Math.min(4, Number($("[data-image-count]").value || 1))),
                  inputImageUrl: inputImageUrls[0] || "",
                  inputImageUrls,
                  userInstruction: $("[data-user-instruction]").value
                })
              });
              state.user = data.user;
              state.tasks.unshift(data.task);
              updateMemberState();
              renderTasks();
              setMessage("任务已提交，正在生成中…");
              watchTaskUntilDone(data.task.id);
            } catch (e) {
              setMessage(e.message);
            } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = "提交 AI 任务";
            }
          });
        };

        const initPlans = () => {
          $("[data-plan-list]").addEventListener("click", async (e) => {
            const btn = e.target.closest("[data-open-plan]");
            if (!btn) return;
            if (!state.user) {
              openModal();
              return;
            }
            try {
              const data = await api("/api/memberships/subscribe", { method: "POST", body: JSON.stringify({ planCode: btn.dataset.openPlan }) });
              state.user = data.user;
              updateMemberState();
              setMessage("积分已到账。");
            } catch (e) {
              setMessage(e.message);
            }
          });
        };

        const bootstrap = async () => {
          initAuth();
          initPlans();
          initStudio();
          updateAuthMode();
          updateTaskTypeButtons();
          try {
            const planData = await api("/api/membership-plans");
            state.plans = planData.plans;
            await refreshMe();
            renderPlans();
            await Promise.all([renderPromptOptions(), renderModels(), loadTasks()]);
            const planCode = new URLSearchParams(window.location.search).get("plan");
            if (planCode && !state.user) openModal();
          } catch (e) {
            setMessage(e.message);
          }
          updateMemberState();
          renderTasks();
        };

        bootstrap();
      })();
    </script>
  </body>
</html>
