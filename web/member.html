<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会员中心 - 光影AI</title>
    <link rel="stylesheet" href="./styles.css?v=20260426-member1" />
  </head>
  <body id="top" class="member-page">
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="./index.html" aria-label="光影AI 首页">
          <span class="brand-name">光影AI</span>
          <span class="brand-line">AI摄影 · 创作 · 美学</span>
        </a>
        <nav class="nav" aria-label="主导航">
          <a href="./index.html">首页</a>
          <a href="./index.html#works">作品集</a>
          <a class="active" href="#top">会员中心</a>
          <a href="#studio">AI创作</a>
          <a href="#records">生成记录</a>
        </nav>
        <a class="header-cta" href="./index.html#booking">预约咨询</a>
      </div>
    </header>

    <main class="member-main">
      <section class="member-hero">
        <div class="shell member-hero-inner">
          <div>
            <h1>会员中心</h1>
            <p>管理积分，生成图片，查看创作记录</p>
          </div>
          <div class="member-summary">
            <span>登录状态</span>
            <strong data-login-state>未登录</strong>
            <em>当前方案：<b data-current-plan>未开通</b></em>
            <em><b data-credit-balance>0</b> 积分</em>
            <button class="member-login-toggle" type="button" data-login-toggle>登录 / 注册</button>
          </div>
        </div>
      </section>

      <section class="member-section">
        <div class="shell">
          <div class="auth-panel" data-auth-panel>
            <div class="section-title">
              <div>
                <h2>注册登录</h2>
                <p>手机号验证码登录，未注册手机号会自动创建账号</p>
              </div>
            </div>
            <div class="auth-grid">
              <div class="segmented auth-tabs" data-auth-mode>
                <button class="active" type="button" data-mode="phone-login">手机号登录</button>
                <button type="button" data-mode="reset">忘记密码</button>
                <button type="button" data-mode="wechat">微信扫码</button>
              </div>
              <label>
                手机号
                <input type="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号" data-auth-phone />
              </label>
              <label data-code-row>
                验证码
                <span class="inline-field">
                  <input type="text" inputmode="numeric" maxlength="4" placeholder="开发验证码 8888" data-auth-code />
                  <button type="button" data-send-code>获取验证码</button>
                </span>
              </label>
              <label data-password-row>
                新密码
                <input type="password" placeholder="8-32 位，至少 3 类字符" data-auth-password />
              </label>
              <label data-confirm-row>
                确认密码
                <input type="password" placeholder="再次输入密码" data-auth-confirm />
              </label>
              <button class="submit-ai" type="button" data-auth-submit>提交</button>
              <button class="member-login-toggle logout-button" type="button" data-logout>退出登录</button>
              <p class="form-message" data-auth-message role="status"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="member-section">
        <div class="shell">
          <div class="section-title">
            <div>
              <h2>会员订阅</h2>
              <p>套餐版本、积分和生成张数由 mock 数据维护</p>
            </div>
          </div>
          <div class="member-plan-grid" data-plan-list></div>
        </div>
      </section>

      <section id="studio" class="member-section">
        <div class="shell">
          <div class="section-title">
            <div>
              <h2>AI 图片生成 / 修改</h2>
              <p>选择提示词标题并提交任务，核心 prompt 不在前台展示</p>
            </div>
          </div>
          <div class="member-workbench">
            <div class="ai-form">
              <div class="credit-bar">
                <span data-member-state>未开通会员</span>
                <strong><b data-form-credit>0</b> 积分</strong>
              </div>
              <div class="segmented" data-task-type>
                <button class="active" type="button" data-type="generate">生成图片</button>
                <button type="button" data-type="edit">修改图片</button>
              </div>
              <label>
                提示词标题
                <select data-prompt-select></select>
              </label>
              <label>
                生图模型
                <select data-model-select></select>
              </label>
              <label>
                图片尺寸
                <select data-size-select>
                  <option value="1:1">1:1 方图</option>
                  <option value="3:4">3:4 人像</option>
                  <option value="16:9">16:9 横图</option>
                </select>
              </label>
              <label>
                数量
                <input type="number" min="1" max="4" value="1" data-image-count />
              </label>
              <label class="upload-field" data-upload-field>
                上传原图
                <input type="file" accept="image/*" data-image-upload />
                <span data-upload-name>修改图片时需要上传原图</span>
              </label>
              <label>
                补充说明
                <textarea rows="3" placeholder="例如：保留自然肤色，背景更干净" data-user-instruction></textarea>
              </label>
              <p class="cost-line">预计消耗 <strong data-credit-cost>0</strong> 积分</p>
              <button class="submit-ai" type="button" data-submit-ai>提交 AI 任务</button>
              <p class="form-message" data-ai-message role="status"></p>
            </div>

            <div id="records" class="record-panel">
              <div class="task-head">
                <h3>生成记录</h3>
                <span data-task-count>0 条</span>
              </div>
              <div class="result-grid" data-task-list></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const API_BASE = "";
        const tokenKey = "ai_photo_access_token";
        const refreshKey = "ai_photo_refresh_token";
        const state = {
          user: null,
          plans: [],
          prompts: [],
          models: [],
          taskType: "generate",
          authMode: "phone-login",
          tasks: []
        };

        const $ = (selector, root = document) => root.querySelector(selector);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        const authHeaders = () => {
          const token = localStorage.getItem(tokenKey);
          return token ? { Authorization: `Bearer ${token}` } : {};
        };

        const api = async (path, options = {}) => {
          const response = await fetch(`${API_BASE}${path}`, {
            ...options,
            headers: {
              "Content-Type": "application/json",
              ...authHeaders(),
              ...(options.headers || {})
            }
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.message || "请求失败");
          return data;
        };

        const saveSession = (data) => {
          if (data.accessToken) localStorage.setItem(tokenKey, data.accessToken);
          if (data.refreshToken) localStorage.setItem(refreshKey, data.refreshToken);
          state.user = data.user;
        };

        const clearSession = () => {
          localStorage.removeItem(tokenKey);
          localStorage.removeItem(refreshKey);
          state.user = null;
          state.tasks = [];
        };

        const setMessage = (text) => {
          $("[data-ai-message]").textContent = text || "";
        };

        const setAuthMessage = (text) => {
          $("[data-auth-message]").textContent = text || "";
        };

        const updateMemberState = () => {
          const membership = state.user?.membership;
          const credits = state.user?.credits || 0;
          $("[data-login-state]").textContent = state.user ? "已登录" : "未登录";
          $("[data-current-plan]").textContent = membership ? membership.planName : "未开通";
          $("[data-credit-balance]").textContent = credits;
          $("[data-form-credit]").textContent = credits;
          $("[data-member-state]").textContent = state.user ? (membership ? `${membership.planName} · ${state.user.phone}` : "已登录，未开通会员") : "未登录";
          $("[data-login-toggle]").textContent = state.user ? "账号信息" : "登录 / 注册";
          $("[data-logout]").style.display = state.user ? "inline-flex" : "none";
          $$("[data-open-plan]").forEach((button) => {
            button.textContent = membership?.planId === button.dataset.planId ? "当前方案" : "开通会员";
          });
        };

        const refreshMe = async () => {
          if (!localStorage.getItem(tokenKey)) return;
          try {
            const data = await api("/api/auth/me");
            state.user = data.user;
          } catch (error) {
            clearSession();
          }
        };

        const renderPlans = () => {
          const list = $("[data-plan-list]");
          list.innerHTML = state.plans.map((plan) => `
            <article class="member-plan-card">
              <span>${plan.version}</span>
              <h3>${plan.name}</h3>
              <strong><small>¥</small>${plan.price}<em>${plan.suffix}</em></strong>
              <p>${plan.credits} 积分 · 可生成 ${plan.quota} 张</p>
              <ul>${plan.features.map((feature) => `<li>${feature}</li>`).join("")}</ul>
              <button type="button" data-open-plan="${plan.code}" data-plan-id="${plan.id}">开通会员</button>
            </article>
          `).join("");
          updateMemberState();
        };

        const updateTaskTypeButtons = () => {
          $$("[data-task-type] button").forEach((button) => {
            button.classList.toggle("active", button.dataset.type === state.taskType);
          });
          $("[data-upload-field]").classList.toggle("is-visible", state.taskType === "edit");
        };

        const renderPromptOptions = async () => {
          const data = await api(`/api/prompts?taskType=${state.taskType}`);
          state.prompts = data.prompts;
          $("[data-prompt-select]").innerHTML = state.prompts.map((prompt) => `<option value="${prompt.id}">${prompt.title} · ${prompt.scene}</option>`).join("");
          updateCost();
        };

        const renderModels = async () => {
          const data = await api(`/api/ai-models?taskType=${state.taskType}`);
          state.models = data.models;
          $("[data-model-select]").innerHTML = state.models.map((model) => `<option value="${model.id}">${model.name}</option>`).join("");
          if (data.preferredModelId) $("[data-model-select]").value = data.preferredModelId;
          updateCost();
        };

        const currentModel = () => state.models.find((model) => model.id === $("[data-model-select]").value);

        const updateCost = () => {
          const count = Math.max(1, Number($("[data-image-count]").value || 1));
          const model = currentModel();
          const cost = model ? Number(model.creditCost?.[state.taskType] || 0) * count : 0;
          $("[data-credit-cost]").textContent = cost;
          return cost;
        };

        const statusText = (status) => ({
          queued: "排队中",
          processing: "生成中",
          succeeded: "已完成",
          failed: "失败",
          refunded: "已退款"
        })[status] || status;

        const renderTasks = () => {
          const list = $("[data-task-list]");
          $("[data-task-count]").textContent = `${state.tasks.length} 条`;
          if (!state.tasks.length) {
            list.innerHTML = `<p class="empty-task">暂无生成记录。</p>`;
            return;
          }

          list.innerHTML = state.tasks.map((task) => `
            <article class="result-card">
              <img src="${task.resultImageUrls?.[0] || "./assets/work-portrait.jpg"}" alt="${task.promptTitle}" />
              <div>
                <strong>${task.promptTitle}</strong>
                <span>${statusText(task.status)} · ${task.aiModelName} · ${task.count} 张 · ${task.creditCost} 积分</span>
                ${task.failureReason ? `<span>${task.failureReason}</span>` : ""}
                ${task.resultImageUrls?.[0] ? `<a href="${task.resultImageUrls[0]}" download>下载图片</a>` : ""}
              </div>
            </article>
          `).join("");
        };

        const loadTasks = async () => {
          if (!state.user) {
            renderTasks();
            return;
          }
          const data = await api("/api/ai-image-tasks");
          state.tasks = data.tasks;
          renderTasks();
        };

        const watchTaskUntilDone = async (taskId) => {
          for (let index = 0; index < 60; index += 1) {
            await new Promise((resolve) => window.setTimeout(resolve, 2000));
            await loadTasks();
            const task = state.tasks.find((item) => item.id === taskId);
            if (!task || task.status === "succeeded" || task.status === "failed") {
              setMessage(task?.status === "succeeded" ? "任务已完成，可在右侧查看和下载。" : (task?.failureReason || "任务处理结束。"));
              return;
            }
          }
          setMessage("任务仍在生成中，稍后可在生成记录查看结果。");
        };

        const updateAuthMode = () => {
          $$("[data-auth-mode] button").forEach((button) => button.classList.toggle("active", button.dataset.mode === state.authMode));
          const needsCode = state.authMode !== "wechat";
          const needsPassword = state.authMode === "reset";
          const needsConfirm = state.authMode === "reset";
          $("[data-code-row]").style.display = needsCode ? "grid" : "none";
          $("[data-password-row]").style.display = needsPassword ? "grid" : "none";
          $("[data-confirm-row]").style.display = needsConfirm ? "grid" : "none";
        };

        const initAuth = () => {
          $("[data-login-toggle]").addEventListener("click", () => {
            $("[data-auth-panel]").scrollIntoView({ behavior: "smooth", block: "start" });
          });

          $("[data-auth-mode]").addEventListener("click", (event) => {
            const button = event.target.closest("[data-mode]");
            if (!button) return;
            state.authMode = button.dataset.mode;
            updateAuthMode();
          });

          $("[data-send-code]").addEventListener("click", async () => {
            try {
              const sceneMap = { "phone-login": "login", reset: "reset_password" };
              const data = await api("/api/auth/verification-codes", {
                method: "POST",
                body: JSON.stringify({ targetType: "phone", target: $("[data-auth-phone]").value, scene: sceneMap[state.authMode] || "login" })
              });
              setAuthMessage(data.devCode ? `验证码已发送，开发环境验证码：${data.devCode}` : "验证码已发送。");
            } catch (error) {
              setAuthMessage(error.message);
            }
          });

          $("[data-auth-submit]").addEventListener("click", async () => {
            const phone = $("[data-auth-phone]").value;
            const code = $("[data-auth-code]").value;
            const password = $("[data-auth-password]").value;
            const confirmPassword = $("[data-auth-confirm]").value;
            try {
              let data;
              if (state.authMode === "phone-login") {
                data = await api("/api/auth/login/phone-code", { method: "POST", body: JSON.stringify({ phone, code }) });
              } else if (state.authMode === "wechat") {
                const qr = await api("/api/auth/wechat/qr/create", { method: "POST" });
                setAuthMessage(qr.message || "微信扫码登录待接入。");
                return;
              } else {
                await api("/api/auth/password/reset", { method: "POST", body: JSON.stringify({ phone, code, password, confirmPassword }) });
                clearSession();
                updateMemberState();
                setAuthMessage("密码已重设，请重新登录。");
                return;
              }
              saveSession(data);
              await Promise.all([renderModels(), loadTasks()]);
              updateMemberState();
              setAuthMessage("已登录。");
            } catch (error) {
              setAuthMessage(error.message);
            }
          });

          $("[data-logout]").addEventListener("click", async () => {
            try {
              await api("/api/auth/logout", { method: "POST", body: JSON.stringify({ refreshToken: localStorage.getItem(refreshKey) }) });
            } catch (error) {
              setAuthMessage(error.message);
            }
            clearSession();
            updateMemberState();
            renderTasks();
            setAuthMessage("已退出登录。");
          });
        };

        const initStudio = () => {
          $("[data-task-type]").addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) return;
            state.taskType = button.dataset.type;
            updateTaskTypeButtons();
            Promise.all([renderPromptOptions(), renderModels()]);
          });

          $("[data-prompt-select]").addEventListener("change", updateCost);
          $("[data-model-select]").addEventListener("change", updateCost);
          $("[data-image-count]").addEventListener("input", updateCost);
          $("[data-image-upload]").addEventListener("change", (event) => {
            const file = event.target.files[0];
            $("[data-upload-name]").textContent = file ? file.name : "修改图片时需要上传原图";
          });

          $("[data-submit-ai]").addEventListener("click", async () => {
            if (!state.user) {
              setMessage("请先登录后再提交 AI 任务。");
              return;
            }
            if (!state.user.membership) {
              setMessage("请先开通会员方案。");
              return;
            }
            if (state.taskType === "edit" && !$("[data-image-upload]").files.length) {
              setMessage("修改图片需要先上传原图。");
              return;
            }
            try {
              const data = await api("/api/ai-image-tasks", {
                method: "POST",
                body: JSON.stringify({
                  taskType: state.taskType,
                  promptTemplateId: $("[data-prompt-select]").value,
                  aiModelId: $("[data-model-select]").value,
                  size: $("[data-size-select]").value,
                  count: Number($("[data-image-count]").value),
                  inputImageUrl: state.taskType === "edit" ? "./assets/work-portrait.jpg" : "",
                  userInstruction: $("[data-user-instruction]").value
                })
              });
              state.user = data.user;
              state.tasks.unshift(data.task);
              updateMemberState();
              renderTasks();
              setMessage("任务已提交，正在生成。");
              watchTaskUntilDone(data.task.id);
            } catch (error) {
              setMessage(error.message);
            }
          });
        };

        const initPlanFromQuery = () => {
          const code = new URLSearchParams(window.location.search).get("plan");
          const plan = state.plans.find((item) => item.code === code);
          if (!plan) return;
          setMessage(`请先登录后开通 ${plan.name}。`);
        };

        const initPlans = () => {
          $("[data-plan-list]").addEventListener("click", async (event) => {
            const button = event.target.closest("[data-open-plan]");
            if (!button) return;
            if (!state.user) {
              setMessage("请先登录后再开通会员方案。");
              $("[data-auth-panel]").scrollIntoView({ behavior: "smooth", block: "start" });
              return;
            }
            try {
              const data = await api("/api/memberships/subscribe", { method: "POST", body: JSON.stringify({ planCode: button.dataset.openPlan }) });
              state.user = data.user;
              updateMemberState();
              setMessage("会员已开通，积分已发放。");
            } catch (error) {
              setMessage(error.message);
            }
          });
        };

        const bootstrap = async () => {
          initAuth();
          initPlans();
          initStudio();
          updateAuthMode();
          updateTaskTypeButtons();
          try {
            const planData = await api("/api/membership-plans");
            state.plans = planData.plans;
            await refreshMe();
            renderPlans();
            await Promise.all([renderPromptOptions(), renderModels(), loadTasks()]);
            initPlanFromQuery();
          } catch (error) {
            setMessage(error.message);
          }
          updateMemberState();
          renderTasks();
        };

        bootstrap();
      })();
    </script>
  </body>
</html>
